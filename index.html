  <link rel="stylesheet" href="./styles/main.css">

<body>

  <main>
    <h1 class="visually-hidden">Fylo Data Storage Component</h1>

    <section class="storage" aria-labelledby="storage-title">
      <h2 class="visually-hidden" id="storage-title">Storage usage</h2>

      <div class="storage__header">
        <img src="./assets/images/logos/logo.svg" alt="Fylo logo" class="storage__brand">

        <ul class="storage__icons">
          <li class="storage__icon">
            <img src="./assets/images/icons/icon-document.svg" alt="">
          </li>
          <li class="storage__icon">
            <img src="./assets/images/icons/icon-folder.svg" alt="">
          </li>
          <li class="storage__icon">
            <img src="./assets/images/icons/icon-upload.svg" alt="">
          </li>
        </ul>
      </div>

      <div class="storage__body">
        <p class="storage__usage" id="storage-usage">You’ve used <strong>815 GB</strong> of your storage</p>

        <div class="storage__bar" role="progressbar" aria-valuenow="815" aria-valuemin="0" aria-valuemax="1000"
          aria-labelledby="storage-usage" aria-valuetext="815 GB used out of 1000 GB">
          <div class="storage__bar-fill"></div>
        </div>

        <p class="visually-hidden" id="storage-limits-label">Storage limits</p>
        <ul class="storage__limits" aria-labelledby="storage-limits-label">
          <li>0 GB</li>
          <li>1000 GB</li>
        </ul>


        <p class="storage__remaining"><strong class="storage__value">185</strong> GB Left</p>
      </div>
    </section>
  </main>

    </small>
  </footer>
</body>

</html>
